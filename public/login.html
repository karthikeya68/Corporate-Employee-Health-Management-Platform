<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OHC Management - Operator Login</title>
  <link rel="stylesheet" href="common/global.css">
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
</head>
<body>

  <!-- Toast Notification System -->
  <div id="toast" class="alert-toast">
    <i id="toast-icon" class="fa-solid"></i>
    <span id="toast-message">Notification message</span>
  </div>

  <!-- Main Login Card -->
  <div class="auth-wrapper">
    <div style="display: flex; flex-direction: column; gap: 1.5rem; width: 100%; max-width: 440px;">
      
      <div class="auth-card glass-panel">
        <div class="logo" style="justify-content: center; margin-bottom: 0.5rem;">
          <i class="fa-solid fa-heart-pulse"></i>
          <span>OHC Management</span>
        </div>
        <h2 style="text-align: center; margin-bottom: 0.25rem;">Operator Login</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem;">Log in to access the Occupational Health Center portal.</p>
        
        <form id="login-form">
          <div class="form-group">
            <label for="login-username">Employee ID or Email</label>
            <div style="position: relative;">
              <input type="text" id="login-username" class="input-ctrl" placeholder="e.g. EMP001 or operator@company.com" required style="padding-left: 2.5rem;">
              <i class="fa-solid fa-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
            </div>
          </div>
          
          <div class="form-group">
            <label for="login-pwd">Password</label>
            <div style="position: relative;">
              <input type="password" id="login-pwd" class="input-ctrl" placeholder="••••••••" required style="padding-left: 2.5rem;">
              <i class="fa-solid fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            <i class="fa-solid fa-right-to-bracket"></i> Access Dashboard
          </button>
        </form>
      </div>



    </div>
  </div>

  <!-- Footer -->
  <footer class="app-footer">
    OHC Management System &copy; 2026. All rights reserved.
  </footer>

  <!-- Custom Mouse Cursor Elements -->
  <div class="custom-cursor-dot" id="custom-dot"></div>
  <div class="custom-cursor-outline" id="custom-outline"></div>

  <script src="login.js"></script>
</body>
</html>
